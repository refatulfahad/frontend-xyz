<div class="col-md-6">
    <h3>{{ editId ? 'Edit Product' : 'Add Product' }}</h3>
    <form>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" class="form-control" [(ngModel)]="productForm.name" name="name" required />
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" class="form-control" [(ngModel)]="productForm.description" name="description" required />
      </div>
      <div class="form-group">
        <label for="price">Price</label>
        <input type="number" id="price" class="form-control" [(ngModel)]="productForm.price" name="price" required />
      </div>
      <div class="form-group">
        <label for="stock">Stock</label>
        <input type="number" id="stock" class="form-control" [(ngModel)]="productForm.stock" name="stock" required />
      </div>
      <div class="form-group">
        <label for="imageUrl">Image URL</label>
        <input type="text" id="imageUrl" class="form-control" [(ngModel)]="productForm.imageUrl" name="imageUrl" />
      </div>
      <button type="button" class="btn btn-success" (click)="save()">{{ editId ? 'Update' : 'Add' }} Product</button>
      <button type="button" class="btn btn-secondary" (click)="goBack()">Back to List</button>
    </form>
  </div>
